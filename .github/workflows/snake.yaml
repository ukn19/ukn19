name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Generate snake
        uses: Platane/snk@v3
        with:
          github_user_name: ukn19
          outputs: |
            dist/github-snake-dark.svg?palette=github-dark&color_snake=#39ff14&color_dots=#003300,#004d00,#006600,#00b300,#39ff14

      - name: Push snake to branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: output
          folder: dist
